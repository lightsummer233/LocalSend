allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.layout.buildDirectory = file('../build')
subprojects {
    project.layout.buildDirectory = rootProject.layout.buildDirectory.dir(project.name)
}

// temporary fix to keep using device_apps
// https://stackoverflow.com/questions/69033022/message-error-resource-androidattr-lstar-not-found
subprojects {
    afterEvaluate { project ->
        if (project.plugins.hasPlugin('com.android.application') ||
                project.plugins.hasPlugin('com.android.library')) {
            project.android {
                compileSdkVersion 37
                buildToolsVersion '37.0.0'
            }
        }
    }
}

subprojects {
    project.evaluationDependsOn(':app')
}
